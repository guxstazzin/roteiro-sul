<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <h1 class="text-2xl font-bold text-blue-900 mb-6 text-center">Checklist de Viagem</h1>
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-lg border-t-4 border-blue-900">
        <form class="space-y-4">
            <label class="flex items-center gap-3"><input type="checkbox" class="w-5 h-5"> 🎫 Passagens aéreas</label>
            <label class="flex items-center gap-3"><input type="checkbox" class="w-5 h-5"> 🏨 Reservas de Hotéis</label>
            <label class="flex items-center gap-3"><input type="checkbox" class="w-5 h-5"> 🚗 Reserva do carro</label>
            <label class="flex items-center gap-3"><input type="checkbox" class="w-5 h-5"> 🎟️ Ingresso Beto Carrero</label>
            <label class="flex items-center gap-3"><input type="checkbox" class="w-5 h-5"> 🧥 Roupas de frio (Curitiba)</label>
            <label class="flex items-center gap-3"><input type="checkbox" class="w-5 h-5"> 🩳 Roupas de praia</label>
        </form>
    </div>
    <div class="text-center mt-8">
        <a href="index.html" class="text-blue-900 font-bold underline">← Voltar para o Roteiro</a>
    </div>
</body>
</html>
